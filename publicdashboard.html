<!DOCTYPE html>
<html>
<body style="background:#111;color:white;font-family:Arial">

<h1>✈ Airline Control</h1>

<h2>Flight</h2>
<input id="id">
<input id="from">
<input id="to">
<input id="time">
<button onclick="addFlight()">Add</button>

<h2>Info</h2>
<input id="k">
<input id="v">
<button onclick="addInfo()">Add</button>

<h2>Announcement</h2>
<input id="msg">
<button onclick="send()">Send</button>

<script>
async function addFlight(){
await fetch("/flight/add",{method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
id,from,to,time
})});
}

async function addInfo(){
await fetch("/info/add",{method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({key:k.value,value:v.value})});
}

async function send(){
await fetch("/announce",{method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text:msg.value})});
}
</script>

</body>
</html>
